version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-non-major:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
      # 0.x minor releases may contain breaking API changes.
      - dependency-name: eslint-plugin-react-refresh
        update-types:
          - version-update:semver-minor

  - package-ecosystem: pip
    directories:
      - /services/inference
      - /ml
    schedule:
      interval: weekly
    groups:
      python-non-major:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-non-major:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /services/inference
    schedule:
      interval: weekly
    ignore:
      # Python runtime upgrades require an explicit application/toolchain migration.
      - dependency-name: python
        versions:
          - ">= 3.13"

  - package-ecosystem: terraform
    directories:
      - /infra/bootstrap
      - /infra/observability
      - /infra/platform
    schedule:
      interval: weekly
    groups:
      terraform-non-major:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
