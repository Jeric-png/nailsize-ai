version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-non-major:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directories:
      - /services/inference
      - /ml
    schedule:
      interval: weekly
    groups:
      python-non-major:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-non-major:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /services/inference
    schedule:
      interval: weekly

  - package-ecosystem: terraform
    directories:
      - /infra/bootstrap
      - /infra/observability
      - /infra/platform
    schedule:
      interval: weekly
    groups:
      terraform-non-major:
        update-types:
          - minor
          - patch
