name: Deploy guided web

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected Vercel environment
        required: true
        type: choice
        options:
          - staging
          - production
      production_confirmation:
        description: Enter DEPLOY_PRODUCTION for production; staging may be blank
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: nailsize-guided-web-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_PRODUCTION_URL: ${{ vars.VERCEL_PRODUCTION_URL }}
    steps:
      - name: Validate deployment authority
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          PRODUCTION_CONFIRMATION: ${{ inputs.production_confirmation }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"
          if [[ "$TARGET_ENVIRONMENT" == "production" ]]; then
            test "$PRODUCTION_CONFIRMATION" = "DEPLOY_PRODUCTION"
            [[ "$VERCEL_PRODUCTION_URL" =~ ^https://[A-Za-z0-9.-]+\.vercel\.app$ ]]
          fi

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run verify:bundle
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:e2e
      - run: npm run test:compat
      - run: npm audit --audit-level=high
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: false

      - name: Install pinned Vercel CLI without credentials
        run: npm install --global --ignore-scripts --no-audit --no-fund vercel@55.0.0

      - name: Pull Vercel project configuration
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          environment=preview
          if [[ "$TARGET_ENVIRONMENT" == "production" ]]; then
            environment=production
          fi
          vercel pull --yes --environment="$environment" --no-color --token="$VERCEL_TOKEN"

      - name: Verify immutable static project contract
        run: node scripts/verify-vercel-pull.mjs

      - name: Preflight protected production domain ownership
        if: inputs.environment == 'production'
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: node scripts/verify-vercel-api.mjs domain

      - name: Build Vercel output without deployment credentials
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          if [[ "$TARGET_ENVIRONMENT" == "production" ]]; then
            vercel build --prod --no-color
          else
            vercel build --no-color
          fi

      - name: Verify exact Vercel prebuilt artifact
        id: artifact
        run: node scripts/verify-guided-build.mjs .vercel/output/static --github-output

      - name: Deploy verified output
        id: deploy
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          args=(deploy --prebuilt --archive=tgz --format=json --no-color --meta "nailsizeCommit=$GITHUB_SHA" --token="$VERCEL_TOKEN")
          if [[ "$TARGET_ENVIRONMENT" == "production" ]]; then
            args+=(--prod --skip-domain)
          fi
          deployment_json="$RUNNER_TEMP/vercel-deployment.json"
          vercel "${args[@]}" > "$deployment_json"
          node scripts/record-vercel-deployment.mjs "$deployment_json"

      - name: Verify deployment identity and target
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.id }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          inspection_json="$RUNNER_TEMP/vercel-inspect-candidate.json"
          vercel inspect "$DEPLOYMENT_URL" --wait --format=json --no-color --token="$VERCEL_TOKEN" > "$inspection_json"
          node scripts/verify-vercel-inspect.mjs "$inspection_json" candidate

      - name: Verify deployment ownership and commit metadata
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.id }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: node scripts/verify-vercel-api.mjs candidate

      - name: Verify deployed client-only release
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          ARTIFACT_DIGEST: ${{ steps.artifact.outputs.artifact_digest }}
        run: node scripts/verify-web-deployment.mjs "$DEPLOYMENT_URL" "$ARTIFACT_DIGEST"

      - name: Promote verified production deployment
        if: inputs.environment == 'production'
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel promote "$DEPLOYMENT_URL" --yes --timeout=3m --no-color --token="$VERCEL_TOKEN"

      - name: Verify promoted production identity
        if: inputs.environment == 'production'
        id: promotion
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.id }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          inspection_json="$RUNNER_TEMP/vercel-inspect-promoted.json"
          vercel inspect "$DEPLOYMENT_URL" --wait --format=json --no-color --token="$VERCEL_TOKEN" > "$inspection_json"
          node scripts/verify-vercel-inspect.mjs "$inspection_json" promoted

      - name: Bind protected production URL to promoted deployment
        if: inputs.environment == 'production'
        id: production
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.id }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: node scripts/verify-vercel-api.mjs promoted

      - name: Verify promoted production artifact
        if: inputs.environment == 'production'
        env:
          PRODUCTION_URL: ${{ steps.production.outputs.production_url }}
          ARTIFACT_DIGEST: ${{ steps.artifact.outputs.artifact_digest }}
        run: node scripts/verify-web-deployment.mjs "$PRODUCTION_URL" "$ARTIFACT_DIGEST"

      - name: Publish deployment URL
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          PRODUCTION_URL: ${{ steps.production.outputs.production_url }}
        run: |
          set -euo pipefail
          published_url="$DEPLOYMENT_URL"
          if [[ "$TARGET_ENVIRONMENT" == "production" ]]; then
            published_url="$PRODUCTION_URL"
          fi
          printf '### %s deployment\n\n' "$TARGET_ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "$published_url" >> "$GITHUB_STEP_SUMMARY"
