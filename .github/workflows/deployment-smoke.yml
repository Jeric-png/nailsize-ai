name: Guided web deployment smoke

on:
  workflow_dispatch:
    inputs:
      frontend_url:
        description: Exact Vercel-generated or project .vercel.app HTTPS URL
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
      - env:
          FRONTEND_URL: ${{ inputs.frontend_url }}
        run: node scripts/verify-web-deployment.mjs "$FRONTEND_URL"
