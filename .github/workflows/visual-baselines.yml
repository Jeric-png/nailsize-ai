name: Visual baselines

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Regenerate Linux baselines
        run: npm run test:e2e -- --update-snapshots
      - uses: actions/upload-artifact@v7
        with:
          name: linux-visual-baselines
          path: tests/e2e/core-flow.spec.ts-snapshots/*-linux.png
          if-no-files-found: error
          retention-days: 7
