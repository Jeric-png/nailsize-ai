name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # v3, pinned so infrastructure validation cannot silently change upstream.
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: "1.15.8"
      - run: terraform -chdir=infra/observability fmt -check -recursive
      - run: terraform -chdir=infra/observability init -backend=false -input=false
      - run: terraform -chdir=infra/observability validate
      - run: terraform -chdir=infra/observability test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  inference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libegl1 libgles2
      - run: pip install -e 'services/inference[dev,landmarks]' -e ml
      - run: ruff format --check services/inference
      - run: ruff check services/inference
      - run: ruff format --check ml
      - run: ruff check ml
      - run: python services/inference/scripts/fetch_hand_landmarker.py
      - run: python services/inference/scripts/smoke_hand_landmarker.py
      - name: Test production and dependency-light ML code
        run: >-
          pytest services/inference/tests ml/tests
          --cov=services/inference/app
          --cov=nailsize_ml.annotation_quality
          --cov=nailsize_ml.dataset
          --cov=nailsize_ml.evaluation
          --cov-fail-under=85

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m venv .venv
      - run: .venv/bin/pip install -e services/inference
      - run: npm run contracts:check

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 14

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      # v0.36.0, pinned to the signed release commit after the 2026 supply-chain incident.
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install 'httpx>=0.28,<1' 'onnx>=1.19,<2'
      - run: python services/inference/scripts/fetch_hand_landmarker.py
      - name: Generate non-release model contract fixture
        run: >-
          PYTHONPATH=services/inference
          python services/inference/tests/generate_container_contract_model.py
          services/inference/models/nail-segmentation.onnx
      - name: Build and readiness-smoke the runtime image
        working-directory: services/inference
        run: |
          docker build -t nailsize-inference:contract .
          MODEL_SHA256="$(sha256sum models/nail-segmentation.onnx | cut -d ' ' -f 1)"
          docker run --detach --name nailsize-contract --publish 8080:8080 \
            --env MODEL_VERSION=container-contract-only \
            --env MODEL_SHA256="$MODEL_SHA256" \
            --env SEGMENTATION_BOUNDARY_ERROR_PX=0.5 \
            nailsize-inference:contract
          trap 'docker logs nailsize-contract; docker rm --force nailsize-contract' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8080/ready; then
              exit 0
            fi
            sleep 1
          done
          exit 1
