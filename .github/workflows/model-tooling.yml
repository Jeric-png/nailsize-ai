name: Model Tooling

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  optional-training-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pinned research toolchain
        run: pip install -e 'ml[training]' 'pytest>=8.4,<9'
      - name: Verify model factory, loss, export, manifest, training, and benchmark
        run: pytest ml/tests/test_modeling.py ml/tests/test_training.py ml/tests/test_benchmark.py
