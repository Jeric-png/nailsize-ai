name: Model Tooling

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  optional-training-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pinned research toolchain
        run: pip install -e 'ml[training]' 'pytest>=8.4,<9'
      - name: Verify model factory, loss, selected-checkpoint export, release chain, training, and benchmark
        run: >-
          pytest
          ml/tests/test_modeling.py
          ml/tests/test_release_bundle.py
          ml/tests/test_training.py
          ml/tests/test_benchmark.py
